<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MuGRiM Piano Roll</title>
    <style>
        :root {
            /* Tennessee Titans Theme */
            --bg: #0C2340; 
            --panel: #162C4E; 
            --text: #FFFFFF;
            --accent-note: #4B92DB; 
            --accent-lock: #C60C30; 
            --step-bg: #22334A;
            --grid-line: #2A3C55;
            --beat-line: #3B5374;
            --bar-line: #56739A;
        }

        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0; padding: 15px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; user-select: none;
        }

        /* --- HEADER CONTROLS --- */
        .controls {
            display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;
            background: var(--panel); padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333;
        }
        .control-group { display: flex; align-items: center; gap: 10px; }
        h1 { margin: 0; font-size: 20px; letter-spacing: 1px; color: var(--text); display: flex; align-items: center; gap: 15px;}
        
        button, select {
            background-color: #333; color: white; border: 1px solid #555;
            padding: 4px 10px; cursor: pointer; border-radius: 4px; font-weight: bold; outline: none; font-size: 12px;
        }
        button:hover, select:hover { background-color: #444; }
        .toggle-btn.active { background-color: var(--accent-lock); border-color: var(--accent-lock); color: white; }
        .bpm-input { width: 45px; background: #222; color: var(--text); border: 1px solid #555; padding: 4px; border-radius: 4px; text-align: center; font-weight: bold; font-size: 12px;}
        .bpm-input:disabled { color: #888; border-color: #444; }

        /* --- THE PIANO ROLL LAYOUT --- */
        .editor-container {
            display: flex; flex-direction: column; flex-grow: 1; 
            background: var(--panel); border-radius: 8px; border: 1px solid #444; overflow: hidden;
            position: relative;
        }

        /* 1. The Lock Track (Top Header) */
        .lock-track {
            display: flex; height: 24px; background: #1A2235; border-bottom: 2px solid #000;
            position: sticky; top: 0; z-index: 10;
        }
        .lock-step {
            box-sizing: border-box; border-right: 1px solid var(--grid-line); cursor: pointer;
            display: flex; justify-content: center; align-items: center; font-size: 10px; color: #555;
        }
        .lock-step:hover { background: rgba(255,255,255,0.1); }
        .lock-step.locked { background: var(--accent-lock); color: white; border-bottom: 2px solid #FFF; }

        /* 2. The Main Grid Area */
        .grid-scroll-area {
            flex-grow: 1; overflow: auto; position: relative; display: flex;
            background: var(--step-bg);
        }

        /* The Piano Keys (Left Sidebar) */
        .piano-keys {
            width: 40px; background: #111; position: sticky; left: 0; z-index: 5; border-right: 2px solid #000;
        }
        .key {
            box-sizing: border-box; border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: flex-end; padding-right: 4px; font-size: 9px; color: #888;
        }
        .key.black { background: #000; color: #555; }
        .key.white { background: #E0E0E0; color: #111; }

        /* The Actual Grid Canvas */
        .grid-content { position: relative; background: var(--step-bg); }
        
        /* Grid Lines drawn via repeating gradients for performance */
        .grid-background {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 0;
        }

        /* 3. The Draggable Notes */
        .note {
            position: absolute; border-radius: 3px; border: 1px solid rgba(255,255,255,0.3);
            box-sizing: border-box; cursor: grab; z-index: 2; display: flex; align-items: center;
            /* Default note color, will be overridden by inline styles for velocity */
            background-color: var(--accent-note); 
        }
        .note:active { cursor: grabbing; }
        .note-resize-handle {
            position: absolute; right: 0; top: 0; bottom: 0; width: 6px; cursor: col-resize;
            background: rgba(255,255,255,0.2); border-left: 1px solid rgba(0,0,0,0.2);
        }
        .note-resize-handle:hover { background: rgba(255,255,255,0.5); }

    </style>
</head>
<body>

    <div class="controls">
        <div class="control-group">
            <h1>MuGRiM</h1>
            <select id="key-select">
                <option value="0">C</option><option value="1">C#</option><option value="2">D</option>
                <option value="3">D#</option><option value="4" selected>E</option><option value="5">F</option>
                <option value="6">F#</option><option value="7">G</option><option value="8">G#</option>
                <option value="9">A</option><option value="10">A#</option><option value="11">B</option>
            </select>
            <select id="mode-select">
                <option value="0">Ionian</option><option value="1" selected>Dorian</option><option value="2">Phrygian</option>
                <option value="3">Lydian</option><option value="4">Mixolydian</option><option value="5">Aeolian</option>
                <option value="6">Locrian</option>
            </select>
        </div>

        <div class="control-group">
            <button id="sync-btn" class="toggle-btn active">Sync: DAW</button>
            <input type="number" id="bpm-input" class="bpm-input" value="120" disabled title="Scroll wheel to adjust">
            <button id="tap-btn" style="background-color: var(--accent-active); border: none;">TAP</button>
            
            <div style="width: 2px; height: 20px; background: #444; margin: 0 5px;"></div>
            
            <label style="font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                <input type="checkbox" id="wheel-velocity-chk"> Wheel Edits Velocity
            </label>
        </div>
    </div>

    <div class="editor-container">
        
        <div class="lock-track" id="lock-track"></div>

        <div class="grid-scroll-area" id="scroll-area" tabindex="0">
            <div class="piano-keys" id="piano-keys"></div>
            
            <div class="grid-content" id="grid-content">
                <div class="grid-background" id="grid-bg"></div>
                </div>
        </div>

    </div>

    <script>
        // --- 1. CORE STATE & SETTINGS ---
        let notes = []; // Array of { id, pitch, start, length, velocity }
        let nextNoteId = 1;

        // Viewport Settings
        let stepWidth = 20; // Pixels per 16th note
        let rowHeight = 16; // Pixels per pitch
        const totalSteps = 256; // 16 bars
        const minPitch = 24; // C1
        const maxPitch = 72; // C5
        const totalPitches = maxPitch - minPitch + 1;

        // UI Elements
        const scrollArea = document.getElementById('scroll-area');
        const gridContent = document.getElementById('grid-content');
        const gridBg = document.getElementById('grid-bg');
        const pianoKeys = document.getElementById('piano-keys');
        const lockTrack = document.getElementById('lock-track');
        const wheelVelocityChk = document.getElementById('wheel-velocity-chk');

        // Rust Communication
        function sendToRust(actionObj) { if (window.ipc) window.ipc.postMessage(JSON.stringify(actionObj)); }

        // --- 2. RENDER THE GRID BACKGROUND ---
        function renderGrid() {
            gridContent.style.width = `${totalSteps * stepWidth}px`;
            gridContent.style.height = `${totalPitches * rowHeight}px`;

            // Draw Piano Keys (Top down: High pitch to Low pitch)
            pianoKeys.innerHTML = '';
            for (let p = maxPitch; p >= minPitch; p--) {
                const keyDiv = document.createElement('div');
                keyDiv.style.height = `${rowHeight}px`;
                const noteInOctave = p % 12;
                const isBlack = [1, 3, 6, 8, 10].includes(noteInOctave);
                keyDiv.className = `key ${isBlack ? 'black' : 'white'}`;
                // Label C notes
                if (noteInOctave === 0) keyDiv.innerText = `C${Math.floor(p/12) - 1}`;
                pianoKeys.appendChild(keyDiv);
            }

            // Draw Vertical Grid Lines using CSS background
            gridBg.style.backgroundSize = `${stepWidth}px ${rowHeight}px, ${stepWidth * 4}px ${rowHeight}px, ${stepWidth * 16}px ${rowHeight}px, 100% ${rowHeight}px`;
            gridBg.style.backgroundImage = `
                linear-gradient(to right, var(--grid-line) 1px, transparent 1px),
                linear-gradient(to right, var(--beat-line) 2px, transparent 2px),
                linear-gradient(to right, var(--bar-line) 3px, transparent 3px),
                linear-gradient(to bottom, var(--grid-line) 1px, transparent 1px)
            `;

            // Draw Lock Track
            lockTrack.innerHTML = '';
            lockTrack.style.width = `${totalSteps * stepWidth}px`;
            // Offset lock track to align with grid (accounting for piano keys sidebar)
            lockTrack.style.marginLeft = '40px'; 
            
            for(let i=0; i<totalSteps; i++) {
                const lockDiv = document.createElement('div');
                lockDiv.className = 'lock-step';
                lockDiv.style.width = `${stepWidth}px`;
                // Add tiny measure numbers
                if (i % 16 === 0) lockDiv.innerText = (i/16)+1;

                lockDiv.addEventListener('click', () => {
                    lockDiv.classList.toggle('locked');
                    const isLocked = lockDiv.classList.contains('locked');
                    if(isLocked) {
                        sendToRust({ type: "SetLockZone", start: i, end: i, index: 0 });
                    } else {
                        // Complex: UI only clears specific index. To match our simple Rust backend, 
                        // we'll send a full re-sync command if we had one. 
                        // For now, double click lock clears all.
                    }
                });
                
                lockDiv.addEventListener('dblclick', () => {
                    document.querySelectorAll('.lock-step').forEach(el => el.classList.remove('locked'));
                    sendToRust({ type: "ClearLockZone", index: 0 });
                });

                lockTrack.appendChild(lockDiv);
            }
        }

        // --- 3. NOTE INTERACTION LOGIC ---
        
        // Helper: Convert velocity 0-127 to Hex Color (Light Blue -> Royal Blue)
        function getVelocityColor(vel) {
            // Map 0 -> 255 (Light), 127 -> 100 (Dark) for Green and Blue channels
            const intensity = 255 - Math.floor((vel / 127) * 155); 
            // e.g. High Vel = #2244aa, Low Vel = #aaccee
            const r = Math.floor(intensity * 0.3).toString(16).padStart(2, '0');
            const g = Math.floor(intensity * 0.7).toString(16).padStart(2, '0');
            const b = intensity.toString(16).padStart(2, '0');
            return `#${r}${g}${b}`;
        }

        function createNoteElement(noteData) {
            const el = document.createElement('div');
            el.className = 'note';
            el.id = `note-${noteData.id}`;
            
            // Position: (maxPitch - pitch) gives us rows from the top
            const yPos = (maxPitch - noteData.pitch) * rowHeight;
            const xPos = noteData.start * stepWidth;
            
            el.style.top = `${yPos}px`;
            el.style.left = `${xPos}px`;
            el.style.width = `${noteData.length * stepWidth}px`;
            el.style.height = `${rowHeight}px`;
            el.style.backgroundColor = getVelocityColor(noteData.velocity);

            // Resize Handle
            const handle = document.createElement('div');
            handle.className = 'note-resize-handle';
            el.appendChild(handle);

            // -- Event Listeners for Moving / Deleting --
            let isDragging = false;
            let isResizing = false;
            let startMouseX, startMouseY, startNoteX, startNoteY, startNoteWidth;

            // Double Click to Delete
            el.addEventListener('dblclick', (e) => {
                e.stopPropagation(); // Don't trigger grid's draw note
                gridContent.removeChild(el);
                sendToRust({ type: "DeleteNote", id: noteData.id });
            });

            // Drag to Move
            el.addEventListener('mousedown', (e) => {
                if(e.target === handle) return; // Let the handle catch resizes
                e.stopPropagation();
                isDragging = true;
                startMouseX = e.clientX; startMouseY = e.clientY;
                startNoteX = parseFloat(el.style.left);
                startNoteY = parseFloat(el.style.top);
            });

            // Drag Handle to Resize
            handle.addEventListener('mousedown', (e) => {
                e.stopPropagation();
                isResizing = true;
                startMouseX = e.clientX;
                startNoteWidth = parseFloat(el.style.width);
            });

            // Mouse Move (Global)
            window.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const dx = e.clientX - startMouseX;
                    const dy = e.clientY - startMouseY;
                    
                    // Snap to grid
                    let newX = Math.round((startNoteX + dx) / stepWidth) * stepWidth;
                    let newY = Math.round((startNoteY + dy) / rowHeight) * rowHeight;
                    
                    // Bounds check
                    if (newX < 0) newX = 0;
                    if (newY < 0) newY = 0;
                    if (newY > (totalPitches - 1) * rowHeight) newY = (totalPitches - 1) * rowHeight;

                    el.style.left = `${newX}px`;
                    el.style.top = `${newY}px`;
                }
                
                if (isResizing) {
                    const dx = e.clientX - startMouseX;
                    // Snap width to grid, minimum 1 step
                    let newWidth = Math.max(stepWidth, Math.round((startNoteWidth + dx) / stepWidth) * stepWidth);
                    el.style.width = `${newWidth}px`;
                }
            });

            // Mouse Up (Global) - Send Updates to Rust
            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    const newStartStep = Math.round(parseFloat(el.style.left) / stepWidth);
                    const newPitch = maxPitch - Math.round(parseFloat(el.style.top) / rowHeight);
                    
                    noteData.start = newStartStep;
                    noteData.pitch = newPitch;
                    sendToRust({ type: "UpdateNote", id: noteData.id, pitch: noteData.pitch, start: noteData.start, length: noteData.length, velocity: noteData.velocity });
                }
                if (isResizing) {
                    isResizing = false;
                    const newLen = Math.round(parseFloat(el.style.width) / stepWidth);
                    noteData.length = newLen;
                    sendToRust({ type: "UpdateNote", id: noteData.id, pitch: noteData.pitch, start: noteData.start, length: noteData.length, velocity: noteData.velocity });
                }
            });

            // Mouse Wheel (Velocity Adjust)
            el.addEventListener('wheel', (e) => {
                if (wheelVelocityChk.checked) {
                    e.preventDefault(); // Stop page scrolling
                    // Adjust velocity
                    let v = noteData.velocity;
                    v = e.deltaY < 0 ? v + 5 : v - 5;
                    v = Math.max(0, Math.min(127, v));
                    noteData.velocity = v;
                    
                    el.style.backgroundColor = getVelocityColor(v);
                    sendToRust({ type: "UpdateNote", id: noteData.id, pitch: noteData.pitch, start: noteData.start, length: noteData.length, velocity: noteData.velocity });
                }
            });

            return el;
        }

        // --- 4. GRID INTERACTIONS ---
        
        // Double Click Grid to Add Note
        gridContent.addEventListener('dblclick', (e) => {
            if(e.target !== gridContent && e.target !== gridBg) return; // Don't trigger if double clicking an existing note

            const rect = gridContent.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const clickY = e.clientY - rect.top;

            const step = Math.floor(clickX / stepWidth);
            const pitchRow = Math.floor(clickY / rowHeight);
            const actualPitch = maxPitch - pitchRow;

            const newNote = {
                id: nextNoteId++,
                pitch: actualPitch,
                start: step,
                length: 4, // Default to a quarter note
                velocity: 100
            };

            const noteEl = createNoteElement(newNote);
            gridContent.appendChild(noteEl);
            
            sendToRust({ 
                type: "AddNote", 
                id: newNote.id, pitch: newNote.pitch, start: newNote.start, 
                length: newNote.length, velocity: newNote.velocity 
            });
        });

        // Modifiers: Wheel Scrolling & Zooming
        scrollArea.addEventListener('wheel', (e) => {
            if (e.ctrlKey && e.shiftKey) {
                // Zoom
                e.preventDefault();
                stepWidth += e.deltaY < 0 ? 2 : -2;
                if(stepWidth < 5) stepWidth = 5;
                if(stepWidth > 50) stepWidth = 50;
                renderGrid();
                // We'd also need to re-render all note positions here in a full app!
            } else if (e.ctrlKey) {
                // Horizontal Scroll
                e.preventDefault();
                scrollArea.scrollLeft += e.deltaY;
            }
        });

        // Focus management to ensure keyboard events work
        scrollArea.addEventListener('mouseenter', () => scrollArea.focus());

        // Initialize UI
        renderGrid();

    </script>
</body>
</html>
