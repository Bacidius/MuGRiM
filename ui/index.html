<body>
    <div id="main-view">
        <div class="header">
            <h1>THE OMEGA COVENANT</h1>
            <button id="btn-to-sequencer">OPEN SEQUENCER</button>
        </div>

        <div class="controls">
            <div class="param-group">
                <label>Rest Probability</label>
                <input type="range" id="rest_prob" min="0" max="100" value="15">
            </div>
            <div class="param-group">
                <label>Lowest Note</label>
                <input type="range" id="min_pitch" min="0" max="127" value="30">
            </div>
            <div class="param-group">
                <label>Highest Note</label>
                <input type="range" id="max_pitch" min="0" max="127" value="52">
            </div>
        </div>
    </div>

    <div id="sequencer-view" style="display: none;">
        <div class="header">
            <button id="btn-to-main">BACK TO DASHBOARD</button>
        </div>
        
        <div id="piano-roll-container"></div>
    </div>

    <script src="script.js"></script> 
</body>
